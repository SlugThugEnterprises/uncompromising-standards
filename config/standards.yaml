# Uncompromising Standards Configuration
# "Code so good you could trust it with your friend's mom's life"

global:
  max_file_lines: 200
  max_function_lines: 50
  allow_single_letter_vars:
    - i
    - j
    - k
    - x
    - y
    - z

rust:
  enforce_error_handling: true
  ban_unwrap: true
  ban_expect: true
  ban_panic: true
  ban_unsafe: true
  ban_unimplemented: true
  ban_dbg_macro: true
  ban_allow_dead_code: true
  ban_allow_unused: true

go:
  enforce_error_handling: true
  ban_panic: true
  ban_nil_deref: true
  require_error_check: true
  ban_fmt_print: true

python:
  ban_bare_except: true
  ban_pass_placeholder: true
  ban_print: true
  ban_debug_breakpoint: true
  require_type_hints: false

ruby:
  ban_bare_rescue: true
  ban_puts: true
  ban_debug_binding: true

javascript:
  ban_console_log: true
  ban_ts_ignore: true
  ban_any_type: true
  ban_debugger: true

typescript:
  ban_console_log: true
  ban_ts_ignore: true
  ban_any_type: true
  strict_null_checks: true

bash:
  require_set_e: true
  require_quoted_vars: true
  ban_unsafe_rm: true

sql:
  ban_select_star: true
  ban_unsafe_drop: true
  require_where_clause: false

markdown:
  ban_placeholders: true
  check_broken_links: false
  max_line_length: 120
